spring.application.name=Users
server.port=8082
spring.main.web-application-type=servlet

spring.datasource.url=jdbc:postgresql://localhost:5432/Users
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka: consumidores de eventos de Rol y Estado
# Patrón orientado a eventos: Users reacciona a cambios sin llamadas HTTP directas
spring.cloud.function.definition=roleAssignedConsumer;estadoAssignedConsumer
spring.cloud.stream.bindings.roleAssignedConsumer-in-0.destination=role-assigned-topic
spring.cloud.stream.bindings.roleAssignedConsumer-in-0.group=users-role-group
spring.cloud.stream.bindings.estadoAssignedConsumer-in-0.destination=estado-assigned-topic
spring.cloud.stream.bindings.estadoAssignedConsumer-in-0.group=users-estado-group

spring.cloud.stream.kafka.binder.brokers=localhost:9092

# Circuit Breaker con Resilience4j
resilience4j.circuitbreaker.instances.getAllUsers.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.getAllUsers.slidingWindowSize=10
resilience4j.circuitbreaker.instances.getAllUsers.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.getAllUsers.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.getAllUsers.failureRateThreshold=50
resilience4j.circuitbreaker.instances.getUserById.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.getUserById.slidingWindowSize=10
resilience4j.circuitbreaker.instances.getUserById.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.getUserById.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.getUserById.failureRateThreshold=50

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

services:

  # ─── INFRAESTRUCTURA ────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── MICROSERVICIOS ─────────────────────────────────────────────────────────
  users-service:
    build:
      context: ./Users
      dockerfile: Dockerfile
    container_name: users-service
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/Users
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      ROL_SERVICE_URL: http://rol-service:8081
      ESTADO_SERVICE_URL: http://estado-service:8082
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8082/api/users || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  rol-service:
    build:
      context: ./Rol
      dockerfile: Dockerfile
    container_name: rol-service
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/Rol
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      USERS_SERVICE_URL: http://users-service:8082
    depends_on:
      kafka:
        condition: service_healthy
      users-service:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/api/roles || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  estado-service:
    build:
      context: ./Estado
      dockerfile: Dockerfile
    container_name: estado-service
    restart: on-failure
    ports:
      - "8086:8082"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/Estado
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      USERS_SERVICE_URL: http://users-service:8082
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8082/api/estados || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  inventario-service:
    build:
      context: ./Inventario
      dockerfile: Dockerfile
    container_name: inventario-service
    restart: on-failure
    ports:
      - "8083:8083"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/Inventario
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8083/api/inventario || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  producto-service:
    build:
      context: ./Producto
      dockerfile: Dockerfile
    container_name: producto-service
    restart: on-failure
    ports:
      - "8085:8085"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/Producto
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    depends_on:
      kafka:
        condition: service_healthy
      estado-service:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8085/api/productos || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  orden-service:
    build:
      context: ./Orden
      dockerfile: Dockerfile
    container_name: orden-service
    restart: on-failure
    ports:
      - "8084:8084"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/Orden
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    depends_on:
      kafka:
        condition: service_healthy
      estado-service:
        condition: service_healthy
      producto-service:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8084/api/ordenes || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # ─── API GATEWAY ────────────────────────────────────────────────────────────
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      rol-service:
        condition: service_healthy
      users-service:
        condition: service_healthy
      inventario-service:
        condition: service_healthy
      producto-service:
        condition: service_healthy
      orden-service:
        condition: service_healthy
      estado-service:
        condition: service_healthy

name: SmartLogix

services:

  # ─── INFRAESTRUCTURA ────────────────────────────────────────────────────────
  # PostgreSQL: base de datos compartida por todos los microservicios.
  # Las 7 bases de datos se crean automáticamente con el script init.sql.
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka en modo KRaft (sin ZooKeeper). Broker compartido por todos los servicios.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Kafdrop: interfaz web para explorar topics y mensajes de Kafka.
  # Disponible en http://localhost:9002
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    restart: on-failure
    ports:
      - "9002:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka:
        condition: service_healthy

  # ─── MICROSERVICIOS ─────────────────────────────────────────────────────────
  # Users: autenticación JWT, registro y gestión de usuarios.
  # Produce: user-created-topic | Consume: role-assigned-topic, estado-assigned-topic
  users-service:
    image: contenedorbenjaxio/smartlogix:users
    container_name: users-service
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/Users
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ROL_SERVICE_URL: http://rol-service:8081
      ESTADO_SERVICE_URL: http://estado-service:8086
      JWT_SECRET: ${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8082/swagger-ui.html || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Rol: asignación automática de roles por dominio de email.
  # Produce: role-assigned-topic | Consume: user-created-topic
  rol-service:
    image: contenedorbenjaxio/smartlogix:rol
    container_name: rol-service
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/Rol
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      USERS_SERVICE_URL: http://users-service:8082
      JWT_SECRET: ${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      users-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/swagger-ui.html || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Estado: asignación de estados según rol del usuario.
  # Produce: estado-assigned-topic | Consume: role-assigned-topic
  estado-service:
    image: contenedorbenjaxio/smartlogix:estado
    container_name: estado-service
    restart: on-failure
    ports:
      - "8086:8086"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/Estado
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      USERS_SERVICE_URL: http://users-service:8082
      JWT_SECRET: ${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8086/swagger-ui.html || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Inventario: gestión de stock en tiempo real.
  # Consume: orden-creada-topic, producto-actualizado-topic
  # Llama sincrónicamente a Producto (validar existencia) con Circuit Breaker.
  inventario-service:
    image: contenedorbenjaxio/smartlogix:inventario
    container_name: inventario-service
    restart: on-failure
    ports:
      - "8083:8083"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/Inventario
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PRODUCTO_SERVICE_URL: http://producto-service:8085
      USERS_SERVICE_URL: http://users-service:8082
      JWT_SECRET: ${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      producto-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8083/swagger-ui.html || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Producto: catálogo de productos del eCommerce.
  # Produce: producto-actualizado-topic
  producto-service:
    image: contenedorbenjaxio/smartlogix:producto
    container_name: producto-service
    restart: on-failure
    ports:
      - "8085:8085"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/Producto
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}
      FOTO_STORAGE_PATH: /app/fotos
    volumes:
      - fotos-data:/app/fotos
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8085/swagger-ui.html || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Orden: ciclo de vida de pedidos con historial de estados.
  # Produce: orden-creada-topic, estado-orden-topic
  # Llama sincrónicamente a Users, Estado y Producto con Circuit Breaker.
  orden-service:
    image: contenedorbenjaxio/smartlogix:orden
    container_name: orden-service
    restart: on-failure
    ports:
      - "8084:8084"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/Orden
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      USERS_SERVICE_URL: http://users-service:8082
      ESTADO_SERVICE_URL: http://estado-service:8086
      PRODUCTO_SERVICE_URL: http://producto-service:8085
      JWT_SECRET: ${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      users-service:
        condition: service_healthy
      estado-service:
        condition: service_healthy
      producto-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8084/swagger-ui.html || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Configuracion: preferencias de usuario (tema, idioma, etc.) por userId.
  # Almacena pares clave-valor en PostgreSQL; el Gateway inyecta X-User-Id.
  configuracion-service:
    image: contenedorbenjaxio/smartlogix:configuracion
    container_name: configuracion-service
    restart: on-failure
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/Configuracion
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8087/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s

  # ─── API GATEWAY / BFF ──────────────────────────────────────────────────────
  # Spring Cloud Gateway: enruta /api/* y /auth/* al microservicio correcto.
  # Valida JWT globalmente (excepto /auth/login y /auth/register).
  # Circuit Breaker por ruta — fallback en /fallback/{servicio}.
  gateway-service:
    image: contenedorbenjaxio/smartlogix:gateway
    container_name: gateway-service
    restart: on-failure
    ports:
      - "80:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}
    depends_on:
      rol-service:
        condition: service_healthy
      users-service:
        condition: service_healthy
      inventario-service:
        condition: service_healthy
      producto-service:
        condition: service_healthy
      orden-service:
        condition: service_healthy
      estado-service:
        condition: service_healthy
      configuracion-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

volumes:
  fotos-data:
  postgres-data:

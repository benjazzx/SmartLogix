spring.application.name=Configuracion
server.port=8087

# ── Base de datos ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/Configuracion
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.maximum-pool-size=3

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── JWT — misma clave que Users para validar tokens generados allí ─────────────
jwt.secret=${JWT_SECRET:SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.Configuracion.example=INFO

name: CI — SmartLogix Microservices

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:

  test-gateway:
    name: Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Test
        run: mvn test -B --no-transfer-progress -s $GITHUB_WORKSPACE/maven-settings.xml
        working-directory: Gateway
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-gateway
          path: Gateway/target/site/jacoco/

  test-users:
    name: Users
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Test
        run: mvn test -B --no-transfer-progress -s $GITHUB_WORKSPACE/maven-settings.xml
        working-directory: Users
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-users
          path: Users/target/site/jacoco/

  test-rol:
    name: Rol
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4

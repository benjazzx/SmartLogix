          path: Orden/target/site/jacoco/

  # ── Quality Gate ──────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - test-gateway
      - test-users
      - test-rol
      - test-estado
      - test-inventario
      - test-producto
      - test-orden
    steps:
      - name: Todos los microservicios pasaron los tests
        run: |
          echo "✅ Gateway   — OK"
          echo "✅ Users      — OK"
          echo "✅ Rol        — OK"
          echo "✅ Estado     — OK"
          echo "✅ Inventario — OK"
          echo "✅ Producto   — OK"
          echo "✅ Orden      — OK"
          echo ""
          echo "Quality Gate PASSED — todos los microservicios superaron sus pruebas unitarias."

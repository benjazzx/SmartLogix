name: CI — SmartLogix Microservices

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

# Configura repositorios de Spring para Spring Boot 4.x / Spring Cloud 2025.x
env:
  MAVEN_OPTS: "-Dmaven.repo.local=${{ github.workspace }}/.m2/repository"

jobs:

  # ── Gateway ──────────────────────────────────────────────────────────────────
  test-gateway:
    name: Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Configurar repositorios Maven
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <profiles>
              <profile>
                <id>spring-repos</id>
                <repositories>
                  <repository>
                    <id>spring-milestones</id>
                    <name>Spring Milestones</name>
                    <url>https://repo.spring.io/milestone</url>
                    <snapshots><enabled>false</enabled></snapshots>
                  </repository>
                  <repository>
                    <id>spring-snapshots</id>
                    <name>Spring Snapshots</name>
                    <url>https://repo.spring.io/snapshot</url>
                    <releases><enabled>false</enabled></releases>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>spring-milestones</id>
                    <url>https://repo.spring.io/milestone</url>
                    <snapshots><enabled>false</enabled></snapshots>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>spring-repos</activeProfile>
            </activeProfiles>
          </settings>
          EOF
      - name: Test
        run: mvn test -B --no-transfer-progress
        working-directory: Gateway
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-gateway
          path: Gateway/target/site/jacoco/


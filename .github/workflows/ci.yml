name: CI — SmartLogix Microservices

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:

  # ── Gateway ──────────────────────────────────────────────────────────────────
  test-gateway:
    name: Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Test
        run: mvn test -B --no-transfer-progress
        working-directory: Gateway
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-gateway
          path: Gateway/target/site/jacoco/

  # ── Users ─────────────────────────────────────────────────────────────────────
  test-users:
    name: Users
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:

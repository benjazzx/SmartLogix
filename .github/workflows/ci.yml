  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test-gateway, test-users, test-rol, test-estado, test-inventario, test-producto, test-orden]
    steps:
      - name: Resultado
        run: |
          echo "✅ Gateway   — OK"
          echo "✅ Users      — OK"
          echo "✅ Rol        — OK"
          echo "✅ Estado     — OK"
          echo "✅ Inventario — OK"
          echo "✅ Producto   — OK"
          echo "✅ Orden      — OK"
          echo "Quality Gate PASSED"

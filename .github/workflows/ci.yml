          name: coverage-inventario
          path: Inventario/target/site/jacoco/

  # ── Producto ──────────────────────────────────────────────────────────────────
  test-producto:
    name: Producto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

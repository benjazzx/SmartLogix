name: CI — SmartLogix

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Gateway
  # ─────────────────────────────────────────────────────────────────────────────
  gateway:
    name: Gateway — Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Tests + JaCoCo (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/settings.xml
        working-directory: Gateway
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-gateway
          path: Gateway/target/site/jacoco/

  # ─────────────────────────────────────────────────────────────────────────────
  # Users
  # ─────────────────────────────────────────────────────────────────────────────
  users:
    name: Users — Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Tests + JaCoCo (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/settings.xml
        working-directory: Users
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-users
          path: Users/target/site/jacoco/

  # ─────────────────────────────────────────────────────────────────────────────
  # Rol
  # ─────────────────────────────────────────────────────────────────────────────
  rol:
    name: Rol — Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Tests + JaCoCo (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/settings.xml
        working-directory: Rol
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-rol
          path: Rol/target/site/jacoco/

  # ─────────────────────────────────────────────────────────────────────────────
  # Estado
  # ─────────────────────────────────────────────────────────────────────────────
  estado:
    name: Estado — Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Tests + JaCoCo (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/settings.xml
        working-directory: Estado
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-estado
          path: Estado/target/site/jacoco/

  # ─────────────────────────────────────────────────────────────────────────────
  # Inventario
  # ─────────────────────────────────────────────────────────────────────────────
  inventario:
    name: Inventario — Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Tests + JaCoCo (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/settings.xml
        working-directory: Inventario
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-inventario
          path: Inventario/target/site/jacoco/

  # ─────────────────────────────────────────────────────────────────────────────
  # Producto
  # ─────────────────────────────────────────────────────────────────────────────
  producto:
    name: Producto — Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Tests + JaCoCo (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/settings.xml
        working-directory: Producto
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-producto
          path: Producto/target/site/jacoco/

  # ─────────────────────────────────────────────────────────────────────────────
  # Orden
  # ─────────────────────────────────────────────────────────────────────────────
  orden:
    name: Orden — Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud necesita historial completo
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Tests + JaCoCo (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/settings.xml
        working-directory: Orden
      - name: SonarCloud Analysis
        run: >
          mvn sonar:sonar -B --no-transfer-progress
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=benjazzx
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: Orden
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-orden
          path: Orden/target/site/jacoco/

  # ─────────────────────────────────────────────────────────────────────────────
  # Configuracion
  # ─────────────────────────────────────────────────────────────────────────────
  configuracion:
    name: Configuracion — Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Tests + JaCoCo (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/settings.xml
        working-directory: Configuracion
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-configuracion
          path: Configuracion/target/site/jacoco/

  # ─────────────────────────────────────────────────────────────────────────────
  # Quality Gate — solo pasa si TODOS los jobs anteriores pasaron
  # ─────────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [gateway, users, rol, estado, inventario, producto, orden, configuracion]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: jacoco-*
          merge-multiple: true
          path: jacoco-reports/
      - name: Resumen
        run: |
          echo "========================================"
          echo " QUALITY GATE — SmartLogix CI"
          echo " Cobertura mínima exigida: 60%"
          echo "========================================"
          echo " Gateway    ✅"
          echo " Users      ✅"
          echo " Rol        ✅"
          echo " Estado     ✅"
          echo " Inventario ✅"
          echo " Producto   ✅"
          echo " Orden      ✅"
          echo " Config     ✅"
          echo "========================================"
          echo " RESULTADO: PASSED ✅"
          echo "========================================"

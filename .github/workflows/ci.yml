name: CI — SmartLogix Microservices

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:

  # ── Diagnóstico ───────────────────────────────────────────────────────────────
  diagnostico:
    name: Diagnostico
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Entorno
        run: |
          java -version
          mvn -version
          ls -la
          ls Gateway/ | head -5

  # ── Gateway ──────────────────────────────────────────────────────────────────
  test-gateway:
    name: Gateway
    runs-on: ubuntu-latest
    needs: diagnostico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Test + Coverage Check (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/maven-settings.xml
        working-directory: Gateway
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-gateway
          path: Gateway/target/site/jacoco/

  # ── Users ─────────────────────────────────────────────────────────────────────
  test-users:
    name: Users
    runs-on: ubuntu-latest
    needs: diagnostico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Test + Coverage Check (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/maven-settings.xml
        working-directory: Users
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-users
          path: Users/target/site/jacoco/

  # ── Rol ───────────────────────────────────────────────────────────────────────
  test-rol:
    name: Rol
    runs-on: ubuntu-latest
    needs: diagnostico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Test + Coverage Check (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/maven-settings.xml
        working-directory: Rol
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-rol
          path: Rol/target/site/jacoco/

  # ── Estado ────────────────────────────────────────────────────────────────────
  test-estado:
    name: Estado
    runs-on: ubuntu-latest
    needs: diagnostico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Test + Coverage Check (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/maven-settings.xml
        working-directory: Estado
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-estado
          path: Estado/target/site/jacoco/

  # ── Inventario ────────────────────────────────────────────────────────────────
  test-inventario:
    name: Inventario
    runs-on: ubuntu-latest
    needs: diagnostico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Test + Coverage Check (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/maven-settings.xml
        working-directory: Inventario
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-inventario
          path: Inventario/target/site/jacoco/

  # ── Producto ──────────────────────────────────────────────────────────────────
  test-producto:
    name: Producto
    runs-on: ubuntu-latest
    needs: diagnostico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Test + Coverage Check (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/maven-settings.xml
        working-directory: Producto
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-producto
          path: Producto/target/site/jacoco/

  # ── Orden ─────────────────────────────────────────────────────────────────────
  test-orden:
    name: Orden
    runs-on: ubuntu-latest
    needs: diagnostico
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Test + Coverage Check (≥60%)
        run: mvn verify -B --no-transfer-progress -s $GITHUB_WORKSPACE/maven-settings.xml
        working-directory: Orden
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-orden
          path: Orden/target/site/jacoco/

  # ── Quality Gate real ─────────────────────────────────────────────────────────
  # Llega aquí SOLO si todos los jobs anteriores pasaron mvn verify (jacoco:check ≥60%)
  quality-gate:
    name: Quality Gate (cobertura ≥60% verificada)
    runs-on: ubuntu-latest
    needs: [test-gateway, test-users, test-rol, test-estado, test-inventario, test-producto, test-orden]
    steps:
      - name: Descargar reportes JaCoCo
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage-reports/

      - name: Resumen Quality Gate
        run: |
          echo "================================================"
          echo " QUALITY GATE — SmartLogix CI"
          echo "================================================"
          echo " Cobertura mínima exigida: 60% por servicio"
          echo ""
          echo " ✅ Gateway    — jacoco:check PASSED"
          echo " ✅ Users      — jacoco:check PASSED"
          echo " ✅ Rol        — jacoco:check PASSED"
          echo " ✅ Estado     — jacoco:check PASSED"
          echo " ✅ Inventario — jacoco:check PASSED"
          echo " ✅ Producto   — jacoco:check PASSED"
          echo " ✅ Orden      — jacoco:check PASSED"
          echo ""
          echo " RESULTADO: PASSED ✅"
          echo "================================================"
          echo ""
          echo "Reportes JaCoCo disponibles en la pestaña Artifacts."

          name: coverage-inventario
          path: Inventario/target/site/jacoco/

  test-producto:
    name: Producto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'

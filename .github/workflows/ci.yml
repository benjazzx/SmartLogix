        working-directory: Estado
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-estado
          path: Estado/target/site/jacoco/

  test-inventario:
    name: Inventario
    runs-on: ubuntu-latest
    steps:

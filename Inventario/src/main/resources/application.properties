spring.application.name=Inventario
server.port=8083
spring.main.web-application-type=servlet

# ── Base de datos ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/Inventario
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Kafka — Inventario produce y consume eventos ───────────────────────────────
spring.cloud.stream.kafka.binder.brokers=localhost:9092
# Consumer: escucha órdenes creadas desde el microservicio Orden
spring.cloud.stream.bindings.onOrdenCreada-in-0.destination=orden-creada-topic
spring.cloud.stream.bindings.onOrdenCreada-in-0.group=inventario-orden-group

# ── URLs de otros microservicios ──────────────────────────────────────────────
producto.service.url=${PRODUCTO_SERVICE_URL:http://localhost:8081}
users.service.url=${USERS_SERVICE_URL:http://localhost:8082}

# ── Circuit Breaker (Resilience4j) ────────────────────────────────────────────
resilience4j.circuitbreaker.instances.productoClient.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.productoClient.slidingWindowSize=10
resilience4j.circuitbreaker.instances.productoClient.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.productoClient.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.productoClient.failureRateThreshold=50

# ── JWT — misma clave que Users para validar tokens generados allí ─────────────
jwt.secret=SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters
jwt.expiration=86400000

# ── Springdoc / OpenAPI ───────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.Inventario.example=DEBUG
logging.level.org.hibernate.SQL=DEBUG


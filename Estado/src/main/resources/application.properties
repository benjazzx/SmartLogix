spring.application.name=Estado
server.port=8082
spring.main.web-application-type=servlet

spring.datasource.url=jdbc:postgresql://localhost:5432/Estado
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.cloud.function.definition=processRoleAssigned
spring.cloud.stream.bindings.processRoleAssigned-in-0.destination=role-assigned-topic
spring.cloud.stream.bindings.processRoleAssigned-in-0.group=estado-group
spring.cloud.stream.bindings.processRoleAssigned-out-0.destination=estado-assigned-topic
spring.cloud.stream.kafka.binder.brokers=localhost:9092

# URL del microservicio Users para llamadas HTTP (Circuit Breaker aplicado en UsersClient)
users.service.url=${USERS_SERVICE_URL:http://localhost:8082}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

resilience4j.circuitbreaker.instances.estadoService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.estadoService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.estadoService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.estadoService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.estadoService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.estadoService.failureRateThreshold=50

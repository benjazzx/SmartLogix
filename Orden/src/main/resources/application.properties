spring.application.name=Orden
server.port=8084
spring.main.web-application-type=servlet

spring.datasource.url=jdbc:postgresql://localhost:5432/Orden
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Kafka - Orden solo produce eventos (StreamBridge no requiere bindings declarados)
spring.cloud.stream.kafka.binder.brokers=localhost:9092

# URLs de otros microservicios
users.service.url=${USERS_SERVICE_URL:http://localhost:8082}
estado.service.url=${ESTADO_SERVICE_URL:http://localhost:8086}
producto.service.url=${PRODUCTO_SERVICE_URL:http://localhost:8085}

# Circuit Breaker
resilience4j.circuitbreaker.instances.getOrden.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.getOrden.slidingWindowSize=10
resilience4j.circuitbreaker.instances.getOrden.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.getOrden.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.getOrden.failureRateThreshold=50
resilience4j.circuitbreaker.instances.productoClient.slidingWindowSize=10
resilience4j.circuitbreaker.instances.productoClient.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.productoClient.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.productoClient.failureRateThreshold=50

# JWT — misma clave que Users para validar tokens generados alli
jwt.secret=${JWT_SECRET:SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}
jwt.expiration=86400000

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

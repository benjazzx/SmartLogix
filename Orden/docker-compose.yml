services:
  orden-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orden-service
    restart: on-failure
    ports:
      - "8084:8084"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: host.docker.internal:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/Orden
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      USERS_SERVICE_URL: http://host.docker.internal:8082
      ESTADO_SERVICE_URL: http://host.docker.internal:8086
      JWT_SECRET: ${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8084/swagger-ui.html || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

services:
  producto-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: producto-service
    restart: on-failure
    ports:
      - "8085:8085"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: host.docker.internal:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/Producto
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8085/swagger-ui.html || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

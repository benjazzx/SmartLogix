spring.application.name=Producto
server.port=8085
spring.main.web-application-type=servlet

# ── Base de datos ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/Producto
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Kafka — Producto publica eventos de producto-actualizado-topic ─────────────
spring.cloud.stream.kafka.binder.brokers=localhost:9092

# ── JWT — misma clave que Users para validar tokens generados allí ─────────────
jwt.secret=${JWT_SECRET:SmartLogixSuperSecretKeyForJWT2024MustBeAtLeast32Characters}
jwt.expiration=86400000

# ── Springdoc / OpenAPI ───────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.Producto.example=DEBUG

services:
  rol-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rol-service
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/Rol
      SPRING_DATASOURCE_USERNAME: postgres
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/api/roles || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

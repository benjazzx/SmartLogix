spring.application.name=Rol
server.port=8081
spring.main.web-application-type=servlet

spring.datasource.url=jdbc:postgresql://localhost:5432/Rol
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.cloud.stream.kafka.binder.brokers=localhost:9092

# Consumer: escucha cuando Users registra un nuevo usuario para asignarle rol automáticamente
spring.cloud.function.definition=userRegisteredConsumer
spring.cloud.stream.bindings.userRegisteredConsumer-in-0.destination=user-created-topic
spring.cloud.stream.bindings.userRegisteredConsumer-in-0.group=rol-users-group

# URL del microservicio Users para llamadas HTTP (Circuit Breaker aplicado en UsersClient)
users.service.url=${USERS_SERVICE_URL:http://localhost:8082}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method